<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Water polo game log — log events poolside, produce official game sheets">
  <meta name="theme-color" content="#0a0e1a">
  <title>wplog — Water Polo Game Log</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Code+Pro:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/print.css" media="print">
</head>

<body>
  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Foul-Out Overlay -->
  <div id="foulout-overlay" class="overlay">
    <div class="overlay-content foulout-card">
      <div id="foulout-title" class="overlay-title foulout-title"></div>
      <div id="foulout-message" class="overlay-message"></div>
      <button id="foulout-dismiss" class="btn btn-primary">Dismiss</button>
    </div>
  </div>

  <!-- Confirm Dialog -->
  <div id="confirm-overlay" class="overlay">
    <div class="overlay-content confirm-card">
      <div id="confirm-title" class="overlay-title confirm-title"></div>
      <div id="confirm-message" class="overlay-message confirm-message"></div>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="btn btn-outline confirm-action-btn">Cancel</button>
        <button id="confirm-ok" class="btn confirm-action-btn">OK</button>
      </div>
    </div>
  </div>

  <!-- About Dialog -->
  <div id="about-overlay" class="overlay">
    <div class="overlay-content about-card">
      <div class="about-title">wplog</div>
      <div class="about-subtitle">Water Polo Game Log</div>
      <div class="about-info">
        <div class="about-row">
          <span class="about-label">Version</span>
          <span class="about-value" id="about-version"></span>
        </div>
        <div class="about-row">
          <span class="about-label">License</span>
          <span class="about-value"><a href="#" id="about-license-link">Apache 2.0</a></span>
        </div>
        <div class="about-row">
          <span class="about-label">Author</span>
          <span class="about-value">Marko Milivojevic</span>
        </div>
        <div class="about-row">
          <span class="about-label">Source</span>
          <span class="about-value"><a href="https://github.com/icemarkom/wplog" target="_blank"
              rel="noopener">github.com/icemarkom/wplog</a></span>
        </div>
      </div>
      <p class="about-description">Log water polo game events poolside and produce official game sheets. Works offline
        as a Progressive Web App.</p>
      <p class="about-privacy"><a href="#" id="about-privacy-link">Privacy Policy</a></p>
      <button id="about-dismiss" class="btn btn-primary about-dismiss-btn">Close</button>
    </div>
  </div>

  <!-- Privacy Policy Dialog -->
  <div id="privacy-overlay" class="overlay">
    <div class="overlay-content privacy-card">
      <div id="privacy-body" class="privacy-body fetched-content"></div>
      <button id="privacy-dismiss" class="btn btn-primary privacy-dismiss-btn">OK</button>
    </div>
  </div>

  <!-- License Overlay -->
  <div id="license-overlay" class="overlay">
    <div class="overlay-content privacy-card">
      <div id="license-body" class="license-body fetched-content"></div>
      <button id="license-dismiss" class="btn btn-primary privacy-dismiss-btn">OK</button>
    </div>
  </div>

  <!-- QR Code Full-Screen Overlay -->
  <div id="qr-overlay" class="overlay qr-overlay">
    <div class="qr-fullscreen-wrap">
      <img src="img/qr-wplog.svg" alt="QR code for wplog" class="qr-fullscreen">
    </div>
  </div>

  <!-- Navigation -->
  <nav class="nav-bar">
    <button id="nav-setup" class="nav-btn active">Setup</button>
    <button id="nav-live" class="nav-btn" disabled>Live</button>
    <button id="nav-sheet" class="nav-btn" disabled>Sheet</button>
    <button id="nav-share" class="nav-btn">Share</button>
    <button id="nav-help" class="nav-btn">Help</button>
  </nav>

  <!-- ==================== SETUP SCREEN ==================== -->
  <section id="screen-setup" class="screen active">
    <div class="screen-content" id="setup-content"></div>
  </section>

  <!-- ==================== LIVE LOG SCREEN ==================== -->
  <section id="screen-live" class="screen">
    <div class="screen-content" id="live-content"></div>
  </section>

  <!-- ==================== EVENT MODAL ==================== -->
  <div id="event-modal" class="event-modal">
    <div class="event-modal-content" id="modal-content"></div>
  </div>

  <!-- ==================== GAME SHEET SCREEN ==================== -->
  <section id="screen-sheet" class="screen">
    <div class="screen-content" id="sheet-container"></div>
  </section>

  <!-- ==================== SHARE SCREEN ==================== -->
  <section id="screen-share" class="screen">
    <div class="screen-content" id="share-content"></div>
  </section>

  <!-- ==================== HELP SCREEN ==================== -->
  <section id="screen-help" class="screen">
    <div class="screen-content">
      <div id="help-content" class="fetched-content"></div>
    </div>
  </section>

  <footer class="app-footer">
    Copyright &copy; <span id="copy-year"></span> Marko Milivojevic &middot;
    <a href="https://github.com/icemarkom/wplog" target="_blank" rel="noopener">wplog</a>
    <span id="app-version"></span> &middot;
    <a href="#" id="footer-about-link">About</a>
  </footer>
  <script>document.getElementById("copy-year").textContent = new Date().getFullYear();</script>

  <!-- Screen Loader + Scripts -->
  <script>
    (async function () {
      const screens = [
        { url: "screens/setup.html", target: "setup-content" },
        { url: "screens/live.html", target: "live-content" },
        { url: "screens/modal.html", target: "modal-content" },
        { url: "screens/sheet.html", target: "sheet-container" },
        { url: "screens/share.html", target: "share-content" },
      ];
      await Promise.all(screens.map(async ({ url, target }) => {
        const res = await fetch(url);
        document.getElementById(target).innerHTML = await res.text();
      }));

      // Load JS files in order (dependencies first)
      const scripts = [
        "js/config.js", "js/confirm.js", "js/storage.js", "js/game.js",
        "js/setup.js", "js/events.js", "js/sheet.js", "js/share.js", "js/app.js",
      ];
      for (const src of scripts) {
        await new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = src;
          s.onload = resolve;
          s.onerror = reject;
          document.body.appendChild(s);
        });
      }

      // DOMContentLoaded already fired, so manually init the app
      App.init();
    })();
  </script>
</body>

</html>
