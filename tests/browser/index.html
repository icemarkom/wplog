<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wplog — Browser Tests</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Source Code Pro", "SF Mono", "Menlo", monospace;
      font-size: 13px;
      background: #121212;
      color: #e0e0e0;
      padding: 1.5rem;
      line-height: 1.6;
    }
    h1 {
      font-size: 1.2rem;
      color: #90caf9;
      margin-bottom: 1rem;
      letter-spacing: 0.04em;
    }
    .suite {
      font-weight: bold;
      margin-top: 0.6rem;
      color: #b0bec5;
    }
    .pass { color: #4caf50; }
    .fail { color: #f44336; }
    .todo { color: #ff9800; }
    .summary {
      margin-top: 1.5rem;
      padding-top: 0.75rem;
      border-top: 1px solid #333;
      font-size: 1rem;
      font-weight: bold;
    }
    #test-sandbox { display: none; }
  </style>
</head>
<body>
  <h1>WPLOG — BROWSER TESTS</h1>
  <div id="test-results"></div>
  <div id="test-sandbox"></div>

  <script type="module">
    import { runTests } from "../harness.js";

    // Import browser test modules here — they self-register via describe/it.
    import "./setup.test.js";
    import "./events.test.js";
    import "./app.test.js";
    import "./confirm.test.js";
    import "./share.test.js";
    import "./sheet.test.js";

    // Import the smoke test to verify the harness works.
    import "./smoke.test.js";

    runTests();
  </script>
</body>
</html>
